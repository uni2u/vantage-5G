apiVersion: apps/v1
kind: Deployment
metadata:
  name: iperf-server
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: iperf-server
  template:
    metadata:
      labels:
        app: iperf-server
    spec:
      containers:
        - name: iperf3
          image: networkstatic/iperf3
          args: ["-s"]
          ports:
            - containerPort: 5201
---
apiVersion: v1
kind: Service
metadata:
  name: iperf-server
  namespace: default
spec:
  type: NodePort
  selector:
    app: iperf-server
  ports:
    - name: iperf3
      protocol: TCP
      port: 5201
      targetPort: 5201
      nodePort: 32001
